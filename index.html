<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namma Metro - Train Details</title>
    <style>
        body {
            background-color: #001B6B; /* Metro Blue */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 24px;
        }

        h1 {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .details {
            color: #FFD600; /* Metro Yellow */
            font-size: 24px;
            margin-top: 40px;
            line-height: 1.5;
        }

        .button {
            width: 100%;
            max-width: 300px;
            height: 60px;
            background-color: #FFD600;
            color: black;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        .button:active {
            background-color: #e6c200;
        }

        .secondary-button {
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <h1>Train Details<br>ರೈಲು ವಿವರಗಳು</h1>

    <div class="details">
        Platform: 2<br>
        Coach Position: Pillar 3
    </div>

    <button class="button secondary-button" onclick="announce()">
        ANNOUNCE / ಘೋಷಣೆ
    </button>

    <button class="button" onclick="location.href='coach_layout.html'">
        VIEW COACH LAYOUT
    </button>

    <script>
        function announce() {
            const text = "ಮೈಸೂರು ಎಕ್ಸ್‌ಪ್ರೆಸ್ ಪ್ಲಾಟ್‌ಫಾರ್ಮ್ 2ಕ್ಕೆ ಬರುತ್ತಿದೆ. ಜನರಲ್ ಕೋಚ್ ಪಿಲ್ಲರ್ 3 ಬಳಿ ಇರುತ್ತದೆ.";
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'kn-IN'; // Kannada
            window.speechSynthesis.speak(msg);
        }
    </script>

</body>
</html>
